<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>A Simple Notebook</title>
	<link rel="stylesheet" href="theds.css">
</head>
<body>
	<main class="ds-space" data-flow-list="notes">
		<template rel="note-h1" data-flow-field="type" data-flow-match="note-h1"></template>
		<template rel="note-p" data-flow-field="type" data-flow-match="note-p"></template>
		<template rel="code-js" data-flow-field="type" data-flow-match="code-js"></template>
		<template rel="code-html" data-flow-field="type" data-flow-match="code-html"></template>
		<template rel="code-css" data-flow-field="type" data-flow-match="code-css"></template>
	</main>
	<script type="module">
		import notebook from './app.js'

		globalThis.notebook = notebook
	</script>
</body>
</html>
